services:
  postgres:
      env_file:
        - '.env'
      image: postgres:17-alpine
      container_name: postgres_containerv3
      environment:
        - POSTGRES_USER=${POSTGRES_USER}
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        - POSTGRES_DB=${POSTGRES_DB}
      volumes:
        - ./datapostgre:/var/lib/postgresql/data # Вот здесь изменить путь к внешней бд
      # command: >
      #   postgres -c max_connections=1000
      #            -c shared_buffers=256MB
      #            -c effective_cache_size=768MB
      #            -c maintenance_work_mem=64MB
      #            -c checkpoint_completion_target=0.7
      #            -c wal_buffers=16MB
      #            -c default_statistics_target=100
      healthcheck:
        test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
        interval: 30s
        timeout: 10s
        retries: 5
      # restart: unless-stopped
      tty: true
      ports:
        - '5432:5432'
      stdin_open: true
      networks:
        - database-net

  backend:
    build:
      context: ./cash
      dockerfile: Dockerfile
    container_name: aspnet_container
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres_containerv3;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__Redis=postgres_containerv3:6379,password=${REDIS_PASSWORD},user=${REDIS_USER}
      - Redis__Host=redis_container
      - Redis__Password=${REDIS_PASSWORD}
    # ports:
    #   - "7000:8080"
    # depends_on:
    #   postgres:
    #     condition: service_healthy
    networks:
      - database-net
      - front
  react:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: react_image:latest
    container_name: react
    # restart: unless-stopped
    # ports:
    #   - '8080:3000'
    command: >
      sh -c "npm run start -- --host 0.0.0.0"
    networks:
      - front
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - react
      - backend
    networks:
      - front
  # restart: unless-stopped
networks:
  database-net:
    driver: bridge
  front:
    driver: bridge