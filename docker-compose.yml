services:
  postgres:
      env_file:
        - '.env'
      image: postgres:17-alpine
      container_name: postgres_containerv3
      environment:
        - POSTGRES_USER=${POSTGRES_USER}
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        - POSTGRES_DB=${POSTGRES_DB}
      volumes:
        - ./datapostgre:/var/lib/postgresql/data # Вот здесь изменить путь к внешней бд
      # command: >
      #   postgres -c max_connections=1000
      #            -c shared_buffers=256MB
      #            -c effective_cache_size=768MB
      #            -c maintenance_work_mem=64MB
      #            -c checkpoint_completion_target=0.7
      #            -c wal_buffers=16MB
      #            -c default_statistics_target=100
      healthcheck:
        test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
        interval: 30s
        timeout: 10s
        retries: 5
      # restart: unless-stopped
      tty: true
      stdin_open: true
      ports:
        - "5432:5432"
      networks:
        - database-net
  redis:
    image: redis:latest
    container_name: redis_container
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_USER=${REDIS_USER}
      - REDIS_USER_PASSWORD=${REDIS_USER_PASSWORD}
    volumes:
      - ./redisdata:/data
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    command: >
      sh -c '
        mkdir -p /usr/local/etc/redis &&
        echo "bind 0.0.0.0" > /usr/local/etc/redis/redis.conf &&
        echo "requirepass $REDIS_PASSWORD" >> /usr/local/etc/redis/redis.conf &&
        echo "appendonly yes" >> /usr/local/etc/redis/redis.conf &&
        echo "appendfsync everysec" >> /usr/local/etc/redis/redis.conf &&
        echo "user default on nopass ~* +@all" > /usr/local/etc/redis/users.acl &&
        echo "user $REDIS_USER on >$REDIS_USER_PASSWORD ~* +@all" >> /usr/local/etc/redis/users.acl &&
        redis-server /usr/local/etc/redis/redis.conf --aclfile /usr/local/etc/redis/users.acl
      '
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$REDIS_PASSWORD", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    # restart: unless-stopped
    tty: true
    stdin_open: true
    networks:
      - database-net
  aspnet-app:
    build:
      context: ./cash
      dockerfile: Dockerfile
    container_name: aspnet_container
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres_containerv3;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__Redis=postgres_containerv3:6379,password=${REDIS_PASSWORD},user=${REDIS_USER}
      - Redis__Host=redis_container
      - Redis__Password=${REDIS_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - database-net
    # restart: unless-stopped
networks:
  database-net:
    driver: bridge