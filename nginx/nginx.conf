server {
    listen 80;
    server_name _;

    # 📁 Раздача статических файлов React
    location / {
        root /usr/share/nginx/html;
        index index.html;
        
        # Критически важно для React Router (SPA):
        # если файл не найден — отдаём index.html, чтобы роутинг отработал на клиенте
        try_files $uri $uri/ /index.html;
        
        # Кэширование статики (опционально, но рекомендуется)
        location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
    }
    
    # 🔗 Проксирование API на ASP.NET бэкенд
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Таймауты для долгих запросов (опционально)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # 🚫 Блокировка доступа к служебным файлам
    location ~ /\. {
        deny all;
    }
}